name: Safety Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  safety-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run data safety check
        run: npm run safety:check

      - name: Build
        run: npm run build
